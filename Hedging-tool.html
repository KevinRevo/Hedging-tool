<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Dashboard</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="root"></div>

    <script type="text/babel">
        // Extraction des hooks React pour éviter l'usage de 'React.useState' partout
        const { useState, useEffect, useMemo } = React;

        // Composant Wrapper pour afficher les icônes Lucide dynamiquement
        const Icon = ({ name, className }) => {
            useEffect(() => {
                // Demande à Lucide de scanner le DOM pour générer les icônes SVG
                lucide.createIcons();
            });
            // Lucide cible l'attribut data-lucide pour insérer le bon SVG
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            // Gestion de la navigation principale
            const [appMode, setAppMode] = useState('strips'); // 'strips' ou 'strategy'
            const [lang, setLang] = useState('fr');

            const translations = {
                fr: {
                    title: "FX Dashboard",
                    modeStrips: "Calculateur de Strips",
                    modeStrategy: "Stratégie de Couverture",
                    subtitle: "Déterminez les taux moyens pour vos couvertures de change.",
                    spotToday: "Spot Today",
                    updated: "Mise à jour",
                    monthly: "Mensuels",
                    quarterly: "Trimestriels",
                    semiAnnual: "Semestriels",
                    periodDetails: "Détails des périodes",
                    add: "Ajouter",
                    addOption: "Ajouter une Option",
                    newPeriod: "Nouvelle Période",
                    blendedRate: "Taux Moyen (Blended)",
                    vsSpot: "vs Spot",
                    comparison: "Comparatif des Strips",
                    howItWorksTitle: "Comment ça marche ?",
                    howItWorksDesc: "Le taux \"Blended\" est la moyenne arithmétique simple des taux de chaque période sélectionnée. Modifiez les taux à gauche pour voir l'impact immédiat sur le prix final.",
                    rate: "Taux",
                    from: "Du",
                    to: "Au",
                    needs: "Vos besoins",
                    forwardFee: "Frais Forward (%)",
                    totalVolume: "Volume Annuel Total",
                    option: "Option",
                    volume: "Volume",
                    points: "Points Forward",
                    forwardRate: "Taux Forward",
                    neededEuro: "€ nécessaires",
                    avgRate: "Taux Moyen Pondéré",
                    annualNeedsPerc: "% des besoins annuels",
                    notional: "Notionnel"
                },
                en: {
                    title: "FX Dashboard",
                    modeStrips: "Strip Calculator",
                    modeStrategy: "Hedging Strategy",
                    subtitle: "Determine average rates for your FX hedging strategy.",
                    spotToday: "Today's Spot",
                    updated: "Updated",
                    monthly: "Monthly",
                    quarterly: "Quarterly",
                    semiAnnual: "Semi-Annual",
                    periodDetails: "Period Details",
                    add: "Add",
                    addOption: "Add Option",
                    newPeriod: "New Period",
                    blendedRate: "Blended Rate",
                    vsSpot: "vs Spot",
                    comparison: "Strip Comparison",
                    howItWorksTitle: "How it works?",
                    howItWorksDesc: "The \"Blended\" rate is the simple arithmetic mean of the rates for each selected period. Edit the rates on the left to see the immediate impact on the final price.",
                    rate: "Rate",
                    from: "From",
                    to: "To",
                    needs: "Your needs",
                    forwardFee: "Forward Fee (%)",
                    totalVolume: "Total Annual Volume",
                    option: "Option",
                    volume: "Volume",
                    points: "Forward Points",
                    forwardRate: "Forward Rate",
                    neededEuro: "€ needed",
                    avgRate: "Weighted Avg Rate",
                    annualNeedsPerc: "% of annual needs",
                    notional: "Notionnel"
                }
            };

            const t = translations[lang];

            // --- ÉTAT MODE STRIPS ---
            const [spotRate, setSpotRate] = useState(1.1572);
            const [activeTab, setActiveTab] = useState('monthly');
            const [strips, setStrips] = useState({
                monthly: [
                    { id: 1, start: '2026-06-01', end: '2026-07-01', rate: 1.1628 },
                    { id: 2, start: '2026-07-01', end: '2026-08-03', rate: 1.1611 },
                    { id: 3, start: '2026-08-03', end: '2026-09-01', rate: 1.1593 },
                    { id: 4, start: '2026-09-01', end: '2026-10-01', rate: 1.1578 },
                    { id: 5, start: '2026-10-01', end: '2026-11-02', rate: 1.1563 },
                    { id: 6, start: '2026-11-02', end: '2026-12-01', rate: 1.1547 },
                    { id: 7, start: '2026-12-01', end: '2027-01-04', rate: 1.1532 },
                    { id: 8, start: '2027-01-04', end: '2027-02-01', rate: 1.1513 },
                    { id: 9, start: '2027-02-01', end: '2027-03-01', rate: 1.1506 },
                    { id: 10, start: '2027-03-01', end: '2027-04-01', rate: 1.1498 },
                ],
                quarterly: [
                    { id: 1, start: '2026-06-01', end: '2026-09-01', rate: 1.1627 },
                    { id: 2, start: '2026-09-01', end: '2026-12-01', rate: 1.1581 },
                    { id: 3, start: '2026-12-01', end: '2027-03-01', rate: 1.1531 },
                    { id: 4, start: '2027-03-01', end: '2027-06-01', rate: 1.1498 },
                ],
                semiAnnual: [
                    { id: 1, start: '2026-06-01', end: '2026-12-01', rate: 1.1628 },
                    { id: 2, start: '2026-12-01', end: '2027-06-01', rate: 1.1594 },
                ]
            });

            // --- ÉTAT MODE STRATÉGIE (DYNAMIQUE) ---
            const [stratConfig, setStratConfig] = useState({
                spotRate: 1.1830,
                forwardFee: 0.60,
                annualVolume: 50500000
            });

            const [strategyOptions, setStrategyOptions] = useState([
                {
                    id: Date.now(),
                    name: "Option 1",
                    forwards: [
                        { id: 1, start: '2026-04-01', end: '2027-03-05', volume: 1000000, points: 11 },
                        { id: 2, start: '2026-06-01', end: '2027-03-05', volume: 3000000, points: 51 },
                        { id: 3, start: '2026-07-01', end: '2027-03-05', volume: 1000000, points: 66 },
                    ]
                }
            ]);

            // --- CALCULS STRIPS ---
            const blendedRates = useMemo(() => {
                const calc = (data) => data.length === 0 ? 0 : data.reduce((acc, curr) => acc + curr.rate, 0) / data.length;
                return {
                    monthly: calc(strips.monthly),
                    quarterly: calc(strips.quarterly),
                    semiAnnual: calc(strips.semiAnnual),
                };
            }, [strips]);

            const stripDiffVsSpotPerc = useMemo(() => {
                if (spotRate === 0) return 0;
                return ((blendedRates[activeTab] / spotRate) - 1) * 100;
            }, [blendedRates, activeTab, spotRate]);

            // --- CALCULS STRATÉGIE ---
            const strategyResults = useMemo(() => {
                return strategyOptions.map(option => {
                    let totalVol = 0;
                    let weightedSum = 0;
                    
                    const detailedForwards = option.forwards.map(f => {
                        const rate = stratConfig.spotRate * (1 - stratConfig.forwardFee / 100) + (f.points / 10000);
                        totalVol += f.volume;
                        weightedSum += (rate * f.volume);
                        return { ...f, calculatedRate: rate };
                    });

                    const avgRate = totalVol > 0 ? weightedSum / totalVol : 0;
                    const euroNeeded = totalVol > 0 ? totalVol / avgRate : 0;
                    const percNeeds = stratConfig.annualVolume > 0 ? (totalVol / stratConfig.annualVolume) * 100 : 0;
                    const diffVsSpotPerc = stratConfig.spotRate > 0 ? ((avgRate / stratConfig.spotRate) - 1) * 100 : 0;

                    return {
                        id: option.id,
                        name: option.name,
                        detailedForwards,
                        avgRate,
                        totalVol,
                        euroNeeded,
                        percNeeds,
                        diffVsSpotPerc
                    };
                });
            }, [strategyOptions, stratConfig]);

            // --- HANDLERS STRIPS ---
            const addStrip = (tab) => {
                const last = strips[tab][strips[tab].length - 1];
                const newId = Math.max(...strips[tab].map(s => s.id), 0) + 1;
                setStrips(prev => ({
                    ...prev,
                    [tab]: [...prev[tab], {
                        id: newId,
                        start: last?.end || '2026-04-01',
                        end: last?.end || '2027-03-05',
                        rate: last?.rate || spotRate
                    }]
                }));
            };

            const removeStrip = (tab, id) => {
                setStrips(prev => ({
                    ...prev,
                    [tab]: prev[tab].filter(s => s.id !== id)
                }));
            };

            const handleStripDateChange = (tab, id, field, val) => {
                setStrips(prev => ({
                    ...prev,
                    [tab]: prev[tab].map(s => s.id === id ? { ...s, [field]: val } : s)
                }));
            };

            const handleStripRateChange = (tab, id, val) => {
                setStrips(prev => ({
                    ...prev,
                    [tab]: prev[tab].map(s => s.id === id ? { ...s, rate: parseFloat(val) || 0 } : s)
                }));
            };

            // --- HANDLERS STRATÉGIE ---
            const addOption = () => {
                const newOption = {
                    id: Date.now(),
                    name: `Option ${strategyOptions.length + 1}`,
                    forwards: [
                        { id: 1, start: '2026-04-01', end: '2027-03-05', volume: 1000000, points: 0 }
                    ]
                };
                setStrategyOptions([...strategyOptions, newOption]);
            };

            const removeOption = (id) => {
                if (strategyOptions.length > 1) {
                    setStrategyOptions(strategyOptions.filter(o => o.id !== id));
                }
            };

            const addStrategyForward = (optionId) => {
                setStrategyOptions(prev => prev.map(opt => {
                    if (opt.id === optionId) {
                        const last = opt.forwards[opt.forwards.length - 1];
                        const newId = Math.max(...opt.forwards.map(f => f.id), 0) + 1;
                        return {
                            ...opt,
                            forwards: [...opt.forwards, {
                                id: newId,
                                start: last?.start || '2026-04-01',
                                end: last?.end || '2027-03-05',
                                volume: 1000000,
                                points: 0
                            }]
                        };
                    }
                    return opt;
                }));
            };

            const removeStrategyForward = (optionId, forwardId) => {
                setStrategyOptions(prev => prev.map(opt => {
                    if (opt.id === optionId) {
                        return {
                            ...opt,
                            forwards: opt.forwards.filter(f => f.id !== forwardId)
                        };
                    }
                    return opt;
                }));
            };

            const updateStrategyForward = (optionId, forwardId, field, val) => {
                setStrategyOptions(prev => prev.map(opt => {
                    if (opt.id === optionId) {
                        return {
                            ...opt,
                            forwards: opt.forwards.map(f => f.id === forwardId ? { ...f, [field]: val } : f)
                        };
                    }
                    return opt;
                }));
            };

            return (
                <div class="min-h-screen bg-slate-50 text-slate-900 font-sans p-4 md:p-8">
                    <div class="max-w-6xl mx-auto">
                        
                        {/* Navigation & Language */}
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                            <div class="flex p-1 bg-white border border-slate-200 rounded-2xl shadow-sm w-fit">
                                <button
                                    onClick={() => setAppMode('strips')}
                                    className={`flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-semibold transition-all ${appMode === 'strips' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:text-slate-800'}`}
                                >
                                    <Icon name="layout-grid" className="w-4 h-4" /> {t.modeStrips}
                                </button>
                                <button
                                    onClick={() => setAppMode('strategy')}
                                    className={`flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-semibold transition-all ${appMode === 'strategy' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:text-slate-800'}`}
                                >
                                    <Icon name="shield-check" className="w-4 h-4" /> {t.modeStrategy}
                                </button>
                            </div>

                            <button
                                onClick={() => setLang(lang === 'fr' ? 'en' : 'fr')}
                                class="flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors font-medium text-slate-700 w-fit"
                            >
                                <Icon name="languages" className="w-4 h-4 text-blue-500" />
                                {lang.toUpperCase()}
                            </button>
                        </div>

                        {appMode === 'strips' ? (
                            <>
                                <header class="mb-8">
                                    <h1 class="text-3xl font-bold tracking-tight text-slate-800">
                                        {t.title} <span class="text-blue-600">Strip Forwards</span>
                                    </h1>
                                    <p class="text-slate-500 mt-1">{t.subtitle}</p>
                                </header>

                                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div class="lg:col-span-2 space-y-6">
                                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-6 w-fit">
                                            <div>
                                                <label class="block text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">{t.spotToday}</label>
                                                <div class="flex items-center gap-2">
                                                    <Icon name="trending-up" className="w-4 h-4 text-emerald-500" />
                                                    <input
                                                        type="number"
                                                        step="0.0001"
                                                        value={spotRate}
                                                        onChange={(e) => setSpotRate(parseFloat(e.target.value) || 0)}
                                                        class="text-xl font-bold bg-transparent border-none focus:ring-0 w-24 p-0 outline-none"
                                                    />
                                                </div>
                                            </div>
                                        </div>

                                        <div class="flex p-1 bg-slate-200 rounded-xl w-fit">
                                            {['monthly', 'quarterly', 'semiAnnual'].map(key => (
                                                <button
                                                    key={key}
                                                    onClick={() => setActiveTab(key)}
                                                    className={`px-6 py-2 rounded-lg text-sm font-medium transition-all ${activeTab === key ? 'bg-white shadow-sm text-blue-600' : 'text-slate-600 hover:text-slate-800'}`}
                                                >
                                                    {t[key]}
                                                </button>
                                            ))}
                                        </div>

                                        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                                <div class="flex items-center gap-2">
                                                    <Icon name="calendar" className="w-5 h-5 text-blue-500" />
                                                    <h2 class="font-semibold text-slate-700">{t.periodDetails} ({t[activeTab]})</h2>
                                                </div>
                                                <button
                                                    onClick={() => addStrip(activeTab)}
                                                    class="flex items-center gap-1 text-sm font-medium text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg transition-colors"
                                                >
                                                    <Icon name="plus" className="w-4 h-4" /> {t.add}
                                                </button>
                                            </div>
                                            <div class="divide-y divide-slate-100 max-h-[500px] overflow-y-auto">
                                                {strips[activeTab].map((strip) => (
                                                    <div key={strip.id} class="p-4 hover:bg-slate-50 transition-colors group flex items-center justify-between">
                                                        <div class="flex items-center gap-6">
                                                            <div class="w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center text-xs font-bold shrink-0">{strip.id}</div>
                                                            <div class="flex items-center gap-3">
                                                                <input
                                                                    type="date"
                                                                    value={strip.start}
                                                                    onChange={(e) => handleStripDateChange(activeTab, strip.id, 'start', e.target.value)}
                                                                    class="text-sm font-medium text-slate-600 bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5"
                                                                />
                                                                <Icon name="arrow-right" className="w-4 h-4 text-slate-300" />
                                                                <input
                                                                    type="date"
                                                                    value={strip.end}
                                                                    onChange={(e) => handleStripDateChange(activeTab, strip.id, 'end', e.target.value)}
                                                                    class="text-sm font-medium text-slate-600 bg-slate-50 border border-slate-200 rounded-lg px-2 py-1.5"
                                                                />
                                                            </div>
                                                        </div>
                                                        <div class="flex items-center gap-4">
                                                            <input
                                                                type="number"
                                                                step="0.0001"
                                                                value={strip.rate}
                                                                onChange={(e) => handleStripRateChange(activeTab, strip.id, e.target.value)}
                                                                class="text-right font-mono font-semibold text-blue-600 bg-transparent border-b border-transparent w-24 outline-none focus:border-blue-300"
                                                            />
                                                            <button
                                                                onClick={() => removeStrip(activeTab, strip.id)}
                                                                class="p-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"
                                                            >
                                                                <Icon name="trash-2" className="w-4 h-4" />
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div class="space-y-6">
                                        <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-8 text-white shadow-xl shadow-blue-200 relative overflow-hidden">
                                            <div class="relative z-10">
                                                <span class="text-sm font-medium uppercase tracking-wider opacity-80">{t.blendedRate}</span>
                                                <div class="flex items-baseline gap-3 mb-4">
                                                    <div class="text-5xl font-bold tabular-nums">{blendedRates[activeTab].toFixed(5)}</div>
                                                    <div className={`text-sm font-bold px-2 py-0.5 rounded-lg ${stripDiffVsSpotPerc > 0 ? 'bg-white/20 text-emerald-300' : 'bg-white/20 text-amber-300'}`}>
                                                        {stripDiffVsSpotPerc > 0 ? '+' : ''}{stripDiffVsSpotPerc.toFixed(2)}%
                                                    </div>
                                                </div>
                                                <div class="text-xs text-blue-100/60 uppercase font-bold tracking-widest">{t.vsSpot} {spotRate.toFixed(4)}</div>
                                            </div>
                                        </div>
                                        <div class="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                                            <h3 class="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">
                                                <Icon name="bar-chart-3" className="w-4 h-4 text-blue-500" /> {t.comparison}
                                            </h3>
                                            <div class="space-y-4">
                                                {['monthly', 'quarterly', 'semiAnnual'].map(key => (
                                                    <div key={key} className={`flex items-center justify-between p-3 rounded-xl ${activeTab === key ? 'bg-blue-50 border-blue-100 border' : 'bg-slate-50'}`}>
                                                        <span class="text-sm font-medium text-slate-600">{t[key]}</span>
                                                        <span class="font-mono font-bold">{blendedRates[key].toFixed(5)}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </>
                        ) : (
                            <div class="space-y-8 pb-20">
                                <header class="flex flex-col md:flex-row md:items-end justify-between gap-4">
                                    <div>
                                        <h1 class="text-3xl font-bold tracking-tight text-slate-800">
                                            {t.modeStrategy} <span class="text-emerald-600">Simulateur</span>
                                        </h1>
                                        <p class="text-slate-500 mt-1">Gérez vos volumes et comparez vos options de couverture.</p>
                                    </div>
                                    <button
                                        onClick={addOption}
                                        class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl shadow-md transition-all font-semibold text-sm"
                                    >
                                        <Icon name="plus" className="w-4 h-4" /> {t.addOption}
                                    </button>
                                </header>

                                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                    <div class="space-y-2">
                                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">{t.spotToday}</label>
                                        <div class="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                            <Icon name="trending-up" className="w-5 h-5 text-emerald-500" />
                                            <input
                                                type="number" step="0.0001"
                                                value={stratConfig.spotRate}
                                                onChange={e => setStratConfig({...stratConfig, spotRate: parseFloat(e.target.value) || 0})}
                                                class="bg-transparent font-bold text-xl outline-none w-full"
                                            />
                                        </div>
                                    </div>
                                    <div class="space-y-2">
                                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">{t.forwardFee}</label>
                                        <div class="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                            <Icon name="refresh-cw" className="w-5 h-5 text-blue-500" />
                                            <input
                                                type="number" step="0.01"
                                                value={stratConfig.forwardFee}
                                                onChange={e => setStratConfig({...stratConfig, forwardFee: parseFloat(e.target.value) || 0})}
                                                class="bg-transparent font-bold text-xl outline-none w-full"
                                            />
                                        </div>
                                    </div>
                                    <div class="space-y-2">
                                        <label class="text-xs font-bold text-slate-400 uppercase tracking-widest">{t.totalVolume}</label>
                                        <div class="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                            <Icon name="dollar-sign" className="w-5 h-5 text-amber-500" />
                                            <input
                                                type="number"
                                                value={stratConfig.annualVolume}
                                                onChange={e => setStratConfig({...stratConfig, annualVolume: parseFloat(e.target.value) || 0})}
                                                class="bg-transparent font-bold text-xl outline-none w-full"
                                            />
                                        </div>
                                    </div>
                                </div>

                                <div class="space-y-12">
                                    {strategyResults.map((res, idx) => (
                                        <div key={res.id} class="space-y-4">
                                            <div class="flex items-center justify-between px-2">
                                                <div class="flex items-center gap-4">
                                                    <h2 class="text-xl font-bold text-slate-700 flex items-center gap-2">
                                                        <div class={`w-3 h-3 rounded-full ${idx % 2 === 0 ? 'bg-blue-500' : 'bg-emerald-500'}`} />
                                                        {res.name}
                                                    </h2>
                                                    {strategyOptions.length > 1 && (
                                                        <button
                                                            onClick={() => removeOption(res.id)}
                                                            class="p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all"
                                                        >
                                                            <Icon name="trash-2" className="w-4 h-4" />
                                                        </button>
                                                    )}
                                                </div>
                                                <button
                                                    onClick={() => addStrategyForward(res.id)}
                                                    class="text-xs font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-xl hover:bg-blue-100 transition-colors flex items-center gap-1"
                                                >
                                                    <Icon name="plus" className="w-3.5 h-3.5" /> {t.add}
                                                </button>
                                            </div>

                                            <div class="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                                                <table class="w-full text-left border-collapse">
                                                    <thead class="bg-slate-50/50 border-b border-slate-100 text-[10px] uppercase font-bold text-slate-400">
                                                        <tr>
                                                            <th class="px-6 py-4">Dates</th>
                                                            <th class="px-6 py-4">{t.volume} ($)</th>
                                                            <th class="px-6 py-4 text-center">Pts</th>
                                                            <th class="px-6 py-4 text-right">Rate</th>
                                                            <th class="px-6 py-4 w-10"></th>
                                                        </tr>
                                                    </thead>
                                                    <tbody class="divide-y divide-slate-50">
                                                        {res.detailedForwards.map(f => (
                                                            <tr key={f.id} class="group hover:bg-slate-50/50 transition-colors">
                                                                <td class="px-6 py-4">
                                                                    <div class="flex items-center gap-2">
                                                                        <input
                                                                            type="date"
                                                                            value={f.start}
                                                                            onChange={(e) => updateStrategyForward(res.id, f.id, 'start', e.target.value)}
                                                                            class="text-sm font-medium border-none p-0 bg-transparent text-slate-600 outline-none cursor-pointer"
                                                                        />
                                                                        <span class="text-slate-300">-</span>
                                                                        <input
                                                                            type="date"
                                                                            value={f.end}
                                                                            onChange={(e) => updateStrategyForward(res.id, f.id, 'end', e.target.value)}
                                                                            class="text-sm font-medium border-none p-0 bg-transparent text-slate-600 outline-none cursor-pointer"
                                                                        />
                                                                    </div>
                                                                </td>
                                                                <td class="px-6 py-4">
                                                                    <input
                                                                        type="number"
                                                                        value={f.volume}
                                                                        onChange={(e) => updateStrategyForward(res.id, f.id, 'volume', parseFloat(e.target.value) || 0)}
                                                                        class="w-full font-bold text-slate-700 bg-transparent outline-none border-b border-transparent focus:border-blue-200"
                                                                    />
                                                                </td>
                                                                <td class="px-6 py-4">
                                                                    <input
                                                                        type="number"
                                                                        value={f.points}
                                                                        onChange={(e) => updateStrategyForward(res.id, f.id, 'points', parseFloat(e.target.value) || 0)}
                                                                        class="w-12 mx-auto text-center text-blue-600 font-bold bg-transparent outline-none border-b border-transparent focus:border-blue-200"
                                                                    />
                                                                </td>
                                                                <td class="px-6 py-4 text-right font-mono text-sm font-semibold text-slate-400">
                                                                    {f.calculatedRate.toFixed(4)}
                                                                </td>
                                                                <td class="px-6 py-4">
                                                                    <button
                                                                        onClick={() => removeStrategyForward(res.id, f.id)}
                                                                        class="p-1.5 text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"
                                                                    >
                                                                        <Icon name="trash-2" className="w-4 h-4" />
                                                                    </button>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>

                                                <div class="p-8 bg-slate-50/40 border-t border-slate-100 grid grid-cols-1 md:grid-cols-3 gap-8">
                                                    <div class="space-y-1">
                                                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{t.avgRate}</span>
                                                        <div class="flex items-baseline gap-2">
                                                            <div class="text-3xl font-black text-slate-800 tabular-nums">
                                                                {res.avgRate.toFixed(4)}
                                                            </div>
                                                            <div className={`text-xs font-bold px-1.5 py-0.5 rounded ${res.diffVsSpotPerc > 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>
                                                                {res.diffVsSpotPerc > 0 ? '+' : ''}{res.diffVsSpotPerc.toFixed(2)}%
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div class="space-y-1">
                                                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{t.annualNeedsPerc}</span>
                                                        <div class={`text-3xl font-black tabular-nums ${res.percNeeds > 100 ? 'text-red-500' : 'text-emerald-500'}`}>
                                                            {res.percNeeds.toFixed(1)}%
                                                        </div>
                                                    </div>
                                                    <div class="space-y-1 text-right">
                                                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{t.neededEuro}</span>
                                                        <div class="text-2xl font-bold text-slate-700">
                                                            {res.euroNeeded.toLocaleString(lang === 'fr' ? 'fr-FR' : 'en-US', {
                                                                style: 'currency',
                                                                currency: 'EUR',
                                                                maximumFractionDigits: 0
                                                            })}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Rendu final de l'application dans le DOM via l'API React 18
        const root = fireplace = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
