                                                <div className="p-8 bg-slate-50/40 border-t border-slate-100 grid grid-cols-1 md:grid-cols-3 gap-8">
                                                    <div className="space-y-1">
                                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{t.avgRate}</span>
                                                        <div className="flex items-baseline gap-2">
                                                            <div className="text-3xl font-black text-slate-800 tabular-nums">{res.avgRate.toFixed(4)}</div>
                                                            <div className={`text-xs font-bold px-1.5 py-0.5 rounded ${res.diffVsSpotPerc > 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>
                                                                {res.diffVsSpotPerc > 0 ? '+' : ''}{res.diffVsSpotPerc.toFixed(2)}%
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="space-y-1">
                                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{t.annualNeedsPerc}</span>
                                                        <div className={`text-3xl font-black tabular-nums ${res.percNeeds > 100 ? 'text-red-500' : 'text-emerald-500'}`}>
                                                            {res.percNeeds.toFixed(1)}%
                                                        </div>
                                                        <div className="w-full bg-slate-200 h-2 rounded-full mt-2 overflow-hidden">
                                                            <div 
                                                                className={`h-full rounded-full transition-all duration-500 ${res.percNeeds > 100 ? 'bg-red-500' : res.percNeeds >= 80 ? 'bg-emerald-500' : 'bg-blue-500'}`}
                                                                style={{ width: `${Math.min(res.percNeeds, 100)}%` }}
                                                            />
                                                        </div>
                                                    </div>
                                                    <div className="space-y-1 text-right">
                                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{currencySymbols[baseCurr] + t.neededBase}</span>
                                                        <div className="text-2xl font-bold text-slate-700">
                                                            {res.euroNeeded.toLocaleString(lang === 'fr' ? 'fr-FR' : 'en-US', {
                                                                style: 'currency', currency: baseCurr, maximumFractionDigits: 0
                                                            })}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            /* --- CONTENU MODE MARGIN CALL --- */
                            <div className="space-y-8 animate-in fade-in duration-500 pb-20">
                                <header className="flex flex-col md:flex-row md:items-end justify-between gap-4">
                                    <div>
                                        <h1 className="text-3xl font-bold tracking-tight text-slate-800">
                                            {t.marginCalculatorTitle} <span className="text-amber-500">({baseCurr}/{quoteCurr})</span>
                                        </h1>
                                        <p className="text-slate-500 mt-1">{t.marginCalculatorSubtitle}</p>
                                    </div>
                                    <button onClick={handleSyncMarginRates} className="flex items-center gap-2 bg-slate-700 hover:bg-slate-800 text-white px-5 py-2.5 rounded-xl shadow-md transition-all font-semibold text-sm">
                                        <RefreshCw className="w-4 h-4" /> {t.importRates}
                                    </button>
                                </header>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    {/* Inputs marge */}
                                    <div className="lg:col-span-2 space-y-6">
                                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm space-y-6">
                                            <h2 className="text-sm font-bold text-slate-400 uppercase tracking-wider pb-3 border-b border-slate-100">{t.inputs}</h2>
                                            
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-500">{t.contractVolume} ({currencySymbols[baseCurr]})</label>
                                                    <div className="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                        <span className="font-bold text-slate-400">{currencySymbols[baseCurr]}</span>
                                                        <input
                                                            type="text"
                                                            value={formatInputNumber(marginVolume)}
                                                            onChange={e => setMarginVolume(parseInputNumber(e.target.value))}
                                                            className="bg-transparent font-bold text-lg outline-none w-full"
                                                        />
                                                    </div>
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-500">{t.spotRate}</label>
                                                    <div className="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                        <TrendingUp />
                                                        <input
                                                            type="number" step="0.0001"
                                                            value={marginSpotRate}
                                                            onChange={e => setMarginSpotRate(parseFloat(e.target.value) || 0)}
                                                            className="bg-transparent font-bold text-lg outline-none w-full"
                                                        />
                                                    </div>
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-500">{t.forwardRate}</label>
                                                    <div className="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                        <Calendar className="w-5 h-5 text-blue-500" />
                                                        <input
                                                            type="number" step="0.0001"
                                                            value={marginForwardRate}
                                                            onChange={e => setMarginForwardRate(parseFloat(e.target.value) || 0)}
                                                            className="bg-transparent font-bold text-lg outline-none w-full"
                                                        />
                                                    </div>
                                                </div>
                                            </div>

                                            <h2 className="text-sm font-bold text-slate-400 uppercase tracking-wider pt-4 pb-3 border-b border-slate-100">{t.marginTerms}</h2>
                                            
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-500">{t.marginInitialDeposit}</label>
                                                    <div className="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                        <input
                                                            type="number" step="0.1"
                                                            value={marginInitialDeposit}
                                                            onChange={e => setMarginInitialDeposit(parseFloat(e.target.value) || 0)}
                                                            className="bg-transparent font-bold text-lg outline-none w-full"
                                                        />
                                                        <span className="font-bold text-slate-400">%</span>
                                                    </div>
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-500">{t.marginTrigger}</label>
                                                    <div className="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                        <input
                                                            type="number" step="0.1"
                                                            value={marginCallTrigger}
                                                            onChange={e => setMarginCallTrigger(parseFloat(e.target.value) || 0)}
                                                            className="bg-transparent font-bold text-lg outline-none w-full"
                                                        />
                                                        <span className="font-bold text-slate-400">%</span>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Graphique de risque de change */}
                                            <div className="pt-4 border-t border-slate-100 space-y-2">
                                                <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider">{t.riskIndicator}</h3>
                                                <div className="w-full bg-slate-100 h-4 rounded-full relative overflow-hidden flex">
                                                    <div className="h-full bg-emerald-500" style={{ width: '40%' }}></div>
                                                    <div className="h-full bg-yellow-500" style={{ width: '30%' }}></div>
                                                    <div className="h-full bg-red-500" style={{ width: '30%' }}></div>
                                                    {marginForwardRate > 0 && (
                                                        <div 
                                                            className="absolute top-0 bottom-0 w-1 bg-slate-900 shadow-md transition-all duration-300"
                                                            style={{ left: `${Math.min(Math.max(((marginSpotRate / marginForwardRate) - 0.9) * 500, 2), 98)}%` }}
                                                        />
                                                    )}
                                                </div>
                                                <div className="flex justify-between text-[10px] font-bold text-slate-400">
                                                    <span>Safe Zone</span>
                                                    <span>Trigger Zone ({marginCalculations.firstRate.toFixed(4)})</span>
                                                    <span>Critical Margin Call</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Recap appels de marge */}
                                    <div className="space-y-6">
                                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm space-y-4">
                                            <h2 className="text-sm font-bold text-slate-400 uppercase tracking-wider pb-2 border-b border-slate-100">{t.calculations}</h2>
                                            
                                            <div className="flex items-center justify-between py-1">
                                                <span className="text-sm font-medium text-slate-600">{t.contractValue} ({baseCurr})</span>
                                                <span className="font-mono font-bold text-slate-800">
                                                    {marginCalculations.contractValueBase.toLocaleString(lang === 'fr' ? 'fr-FR' : 'en-US', {
                                                        style: 'currency', currency: baseCurr, maximumFractionDigits: 2
                                                    })}
                                                </span>
                                            </div>
                                            <div className="flex items-center justify-between py-1">
                                                <span className="text-sm font-medium text-slate-600">{t.initialDepositAmount} ({baseCurr})</span>
                                                <span className="font-mono font-bold text-slate-800">
                                                    {marginCalculations.initialDepositBase.toLocaleString(lang === 'fr' ? 'fr-FR' : 'en-US', {
                                                        style: 'currency', currency: baseCurr, maximumFractionDigits: 2
                                                    })}
                                                </span>
                                            </div>
                                        </div>

                                        <div className="bg-gradient-to-br from-slate-800 to-slate-900 text-white p-6 rounded-3xl shadow-lg space-y-5">
                                            <h2 className="text-xs font-bold text-slate-400 uppercase tracking-wider pb-2 border-b border-slate-700">{t.marginLevels}</h2>
                                            
                                            <div className="flex items-center justify-between py-1">
                                                <span className="text-sm text-slate-300">{t.marginCallAmount} ({baseCurr})</span>
                                                <span className="font-mono font-black text-xl text-white">
                                                    {marginCalculations.marginCallAmountBase.toLocaleString(lang === 'fr' ? 'fr-FR' : 'en-US', {
                                                        style: 'currency', currency: baseCurr, maximumFractionDigits: 2
                                                    })}
                                                </span>
                                            </div>
                                            <div className="flex items-center justify-between py-2 border-t border-slate-700/60">
                                                <span className="text-sm font-semibold text-slate-300">{t.firstMarginCall}</span>
                                                <span className="font-mono font-bold text-lg text-amber-400">{marginCalculations.firstRate.toFixed(4)}</span>
                                            </div>
                                            <div className="flex items-center justify-between py-2 border-t border-slate-700/60">
                                                <span className="text-sm font-semibold text-slate-300">{t.secondMarginCall}</span>
                                                <span className="font-mono font-bold text-lg text-amber-500">{marginCalculations.secondRate.toFixed(4)}</span>
                                            </div>
                                            <div className="flex items-center justify-between py-2 border-t border-slate-700/60">
                                                <span className="text-sm font-semibold text-slate-300">{t.thirdMarginCall}</span>
                                                <span className="font-mono font-bold text-lg text-red-400 animate-pulse">{marginCalculations.thirdRate.toFixed(4)}</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Montage de l'application React
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
