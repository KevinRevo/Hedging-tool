        const availableCurrencies = ['EUR', 'USD', 'GBP', 'CHF', 'HUF', 'PLN'];

        const App = () => {
            const [appMode, setAppMode] = useState('strategy'); 
            const [lang, setLang] = useState('fr');

            const [baseCurr, setBaseCurr] = useState('EUR');
            const [quoteCurr, setQuoteCurr] = useState('USD');

            // Notification éphémère (Toast) pour remplacer alert()
            const [toastMessage, setToastMessage] = useState(null);

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(null), 3000);
            };

            const translations = {
                fr: {
                    title: "FX Dashboard",
                    modeStrips: "Calculateur de Strips",

                    semiAnnual: "Semestriels",

                    add: "Ajouter",

                    newPeriod: "Nouvelle Période",
                    blendedRate: "Taux Moyen (Blended)",
                    vsSpot: "vs Spot",
                    comparison: "Comparatif des Strips",
                    howItWorksTitle: "Comment ça marche ?",
                    howItWorksDesc: "Le taux \"Blended\" est la moyenne arithmétique simple des taux de chaque période sélectionnée. Modifiez les taux à gauche pour voir l'impact immédiat sur le prix final.",

                    totalVolume: "Volume Annuel Total",

                    marginCallAmount: "Montant d'appel de marge",

                    secondMarginCall: "2ème Cours d'Appel de Marge",
                    thirdMarginCall: "3ème Cours d'Appel de Marge",
                    importRates: "Importer taux réels",
                    riskIndicator: "Indicateur de risque de change",
                    copySuccess: "Résumé copié dans le presse-papiers !",

                },
                en: {
                    title: "FX Dashboard",
                    modeStrips: "Strip Calculator",
                    modeStrategy: "Hedging Strategy",
                    subtitle: "Determine average rates for your FX hedging strategy.",
                    spotToday: "Today's Spot",

                    howItWorksDesc: "The \"Blended\" rate is the simple arithmetic mean of the rates for each selected period. Edit the rates on the left to see the immediate impact on the final price.",
                    rate: "Rate",
                    from: "From",
                    to: "To",
                    needs: "Your needs",
                    forwardFee: "Forward Fee (Markup %)",
                    totalVolume: "Total Annual Volume",
                    option: "Option",
                    volume: "Volume",
                    points: "Forward Points",
                    forwardRate: "Forward Rate",
                    neededBase: " needed",
                    avgRate: "Weighted Avg Rate",
                    annualNeedsPerc: "% of annual needs",
                    notional: "Notional",
                    pointsMode: "Points Calculation",
                    manual: "Manual (Pips input)",
                    autoIRP: "Auto (Interest Parity)",
                    rateBase: "Base Currency Rate (ex: EUR %)",
                    rateQuote: "Quote Currency Rate (ex: USD %)",
                    days: "days",
                    refreshRate: "Refresh live rate",
                    strategyTitle: "Simulator",
                    strategyDesc: "Manage your volumes and compare your hedging options.",
                    modeMargin: "Margin Call",
                    marginCalculatorTitle: "Margin Call Calculator",
                    marginCalculatorSubtitle: "Simulate your margin calls and determine your currency risk levels.",
                    inputs: "Inputs",
                    marginTerms: "Margin Terms",
                    calculations: "Calculations",
                    marginLevels: "Margin Call Levels",
                    contractVolume: "Contract volume",
                    spotRate: "Spot Rate",
                    marginInitialDeposit: "Initial Deposit (%)",
                    marginTrigger: "Margin Call Trigger (%)",
                    contractValue: "Contract Value",
                    initialDepositAmount: "Initial Deposit",
                    marginCallAmount: "Margin Call Amount",
                    firstMarginCall: "1st Margin Call Rate",
                    secondMarginCall: "2nd Margin Call Rate",
                    thirdMarginCall: "3rd Margin Call Rate",
                    importRates: "Import current rates",
                    riskIndicator: "Currency Risk Indicator",
                    copySuccess: "Summary copied to clipboard!",
                    copyBtn: "Copy Summary"
                }
            };

            const t = translations[lang];

            const [isLive, setIsLive] = useState(true);

            // --- CONFIGS PAR MODE ---
            const [stripsConfig, setStripsConfig] = useState({
                spotRate: 1.1469,
                forwardFee: 0.80,
                pointsMode: 'auto',
                rateBase: 2.25,
                rateQuote: 3.75
            });

            const [activeTab, setActiveTab] = useState('monthly');
            const [strips, setStrips] = useState({
                monthly: [
                    { id: 1, start: '2026-07-17', end: '2026-08-17', rate: 1.1628, rateOverride: null },
                    { id: 2, start: '2026-08-17', end: '2026-09-17', rate: 1.1611, rateOverride: null },
                    { id: 3, start: '2026-09-17', end: '2026-10-19', rate: 1.1593, rateOverride: null },
                    { id: 4, start: '2026-10-19', end: '2026-11-17', rate: 1.1578, rateOverride: null },
                    { id: 5, start: '2026-11-17', end: '2026-12-17', rate: 1.1563, rateOverride: null },
                    { id: 6, start: '2026-12-17', end: '2027-01-18', rate: 1.1547, rateOverride: null },
                    { id: 7, start: '2027-01-18', end: '2027-02-17', rate: 1.1532, rateOverride: null },
                    { id: 8, start: '2027-02-17', text: '2027-03-17', rate: 1.1513, rateOverride: null },
                    { id: 9, start: '2027-03-17', end: '2027-04-19', rate: 1.1506, rateOverride: null },
                    { id: 10, start: '2027-04-19', end: '2027-07-16', rate: 1.1498, rateOverride: null },
                ],
                quarterly: [
                    { id: 1, start: '2026-07-17', end: '2026-10-19', rate: 1.1627, rateOverride: null },
                    { id: 2, start: '2026-10-19', end: '2027-01-18', rate: 1.1581, rateOverride: null },
                    { id: 3, start: '2027-01-18', end: '2027-04-19', rate: 1.1531, rateOverride: null },
                    { id: 4, start: '2027-04-19', end: '2027-07-16', rate: 1.1498, rateOverride: null },
                ],
                semiAnnual: [
                    { id: 1, start: '2026-07-17', end: '2027-01-18', rate: 1.1628, rateOverride: null },
                    { id: 2, start: '2027-01-18', end: '2027-07-16', rate: 1.1594, rateOverride: null },
                ]
            });

            const [stratConfig, setStratConfig] = useState({
                spotRate: 1.1469,
                forwardFee: 0.80,
                annualVolume: 50500000,
                pointsMode: 'auto',
                rateBase: 2.25,
                rateQuote: 3.75
            });

            const [strategyOptions, setStrategyOptions] = useState([
                {
                    id: Date.now(),
                    name: "Option 1",
                    forwards: [
                        { id: 1, start: '2026-07-17', end: '2027-07-16', volume: 1000000, points: 0, rateOverride: null },
                        { id: 2, start: '2026-09-01', end: '2027-07-16', volume: 3000000, points: 0, rateOverride: null },
                        { id: 3, start: '2026-10-01', end: '2027-07-16', volume: 1000000, points: 0, rateOverride: null },
                    ]
                }
            ]);

            // --- ÉTAT ET CONFIG CALCULATEUR D'APPEL DE MARGE ---
            const [marginVolume, setMarginVolume] = useState(1500000);
            const [marginSpotRate, setMarginSpotRate] = useState(1.1400);
            const [marginForwardRate, setMarginForwardRate] = useState(1.1350);
            const [marginInitialDeposit, setMarginInitialDeposit] = useState(5.00); 
            const [marginCallTrigger, setMarginCallTrigger] = useState(5.00);       

            // --- ACCÈS AUX MARCHÉS EN DIRECT (Modification HTTPS de sécurité pour GitHub) ---
            const fetchSpotPrice = useCallback(async () => {
                try {
                    const response = await fetch(`https://api.coinbase.com/v2/prices/${baseCurr}-${quoteCurr}/spot`);
                    if (!response.ok) return;
                    const result = await response.json();
                    if (result?.data?.amount) {
                        const parsedPrice = parseFloat(result.data.amount);
                        if (!isNaN(parsedPrice) && parsedPrice > 0) {
                            const roundedPrice = Math.round(parsedPrice * 10000) / 10000;
                            setStripsConfig(prev => ({ ...prev, spotRate: roundedPrice }));
                            setStratConfig(prev => ({ ...prev, spotRate: roundedPrice }));
                        }
                    }
                } catch (err) {
                    // Silencieux
                }
            }, [baseCurr, quoteCurr]);

            useEffect(() => {
                if (!isLive) return;
                fetchSpotPrice();
                const interval = setInterval(fetchSpotPrice, 2000);
                return () => clearInterval(interval);
            }, [isLive, fetchSpotPrice]);

            useEffect(() => {
                const baseRate = defaultRates[baseCurr] || 2.0;
                const quoteRate = defaultRates[quoteCurr] || 2.0;
                setStripsConfig(prev => ({ ...prev, rateBase: baseRate, rateQuote: quoteRate }));
                setStratConfig(prev => ({ ...prev, rateBase: baseRate, rateQuote: quoteRate }));
                fetchSpotPrice();
            }, [baseCurr, quoteCurr]);

            // --- STRATEGIE DE COPIE SANS ALERT() ---
            const copyToClipboard = (res) => {
                const summaryText = `--- ${res.name} (${baseCurr}/${quoteCurr}) ---
Taux Moyen Pondéré : ${res.avgRate.toFixed(4)} (${res.diffVsSpotPerc > 0 ? '+' : ''}${res.diffVsSpotPerc.toFixed(2)}% vs Spot)
Volume Total Couvert : ${formatInputNumber(res.totalVol)} ${currencySymbols[quoteCurr]}
Besoins Annuels Couverts : ${res.percNeeds.toFixed(1)}%
Devise de Base Nécessaire : ${res.euroNeeded.toLocaleString(lang === 'fr' ? 'fr-FR' : 'en-US', {
                    style: 'currency', currency: baseCurr, maximumFractionDigits: 0
                })}`;

                const el = document.createElement('textarea');
                el.value = summaryText;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);

                showToast(t.copySuccess);
            };

            // --- SECURISE DES NOMBRES ---
            const formatInputNumber = (val) => {
                if (val === 0) return '0';
                if (!val) return '';
                const separator = lang === 'fr' ? ' ' : ',';
                return val.toString().replace(/\B(?=(\d{3})+(?!\d))/g, separator);
            };

            const parseInputNumber = (str) => {
                const clean = str.replace(/[^\d]/g, '');
                return clean ? parseInt(clean, 10) : 0;
            };

            const getDaysBetween = (start, end) => {
                if (!start || !end) return 0;
                const s = new Date(start);
                const e = new Date(end);
                s.setHours(0, 0, 0, 0);
                e.setHours(0, 0, 0, 0);
                const diffTime = e.getTime() - s.getTime();
                return Math.max(0, Math.round(diffTime / (1000 * 60 * 60 * 24)));
            };

            const calculatedStrips = useMemo(() => {
                const processTab = (tabData) => {
                    return tabData.map(strip => {
                        const days = getDaysBetween(strip.start, strip.end);
                        let pointsUsed = 0;

                        if (stripsConfig.pointsMode === 'auto') {
                            const today = new Date('2026-07-16');
                            const daysToStart = getDaysBetween(today, strip.start);
                            const daysToEnd = getDaysBetween(today, strip.end);

                            const tStart = daysToStart / 360;
                            const tEnd = daysToEnd / 360;
                            const rBase = stripsConfig.rateBase / 100;
                            const rQuote = stripsConfig.rateQuote / 100;

                            const forwardStart = stripsConfig.spotRate * (1 + rQuote * tStart) / (1 + rBase * tStart);
                            const forwardEnd = stripsConfig.spotRate * (1 + rQuote * tEnd) / (1 + rBase * tEnd);
                            const worstRawRate = Math.min(forwardStart, forwardEnd);

                            pointsUsed = Math.round((worstRawRate - stripsConfig.spotRate) * 10000 * 10) / 10;
                        }

                        const rawForward = stripsConfig.spotRate + (pointsUsed / 10000);
                        const theoreticalRate = stripsConfig.pointsMode === 'auto' 
                            ? rawForward * (1 - stripsConfig.forwardFee / 100)
                            : strip.rate;

                        const hasOverride = strip.rateOverride !== undefined && strip.rateOverride !== null && strip.rateOverride !== '';
                        const parsedOverride = hasOverride ? parseFloat(strip.rateOverride) : null;
                        const finalRate = (hasOverride && !isNaN(parsedOverride)) ? parsedOverride : theoreticalRate;

                        return {
                            ...strip,
                            calculatedRate: finalRate,
                            theoreticalRate: theoreticalRate,
                            isOverridden: hasOverride && !isNaN(parsedOverride),
                            days,
                            points: pointsUsed
                        };
                    });
                };

                return {
                    monthly: processTab(strips.monthly),
                    quarterly: processTab(strips.quarterly),
                    semiAnnual: processTab(strips.semiAnnual),
                };
            }, [strips, stripsConfig]);

            const blendedRates = useMemo(() => {
                const calc = (data) => data.length === 0 ? 0 : data.reduce((acc, curr) => acc + curr.calculatedRate, 0) / data.length;
                return {
                    monthly: calc(calculatedStrips.monthly),
                    quarterly: calc(calculatedStrips.quarterly),
                    semiAnnual: calc(calculatedStrips.semiAnnual),
                };
            }, [calculatedStrips]);

            const stripDiffVsSpotPerc = useMemo(() => {
                if (stripsConfig.spotRate === 0) return 0;
                return ((blendedRates[activeTab] / stripsConfig.spotRate) - 1) * 100;
            }, [blendedRates, activeTab, stripsConfig.spotRate]);

            const strategyResults = useMemo(() => {
                return strategyOptions.map(option => {
                    let totalVol = 0;
                    let weightedSum = 0;
                
                    const detailedForwards = option.forwards.map(f => {
                        const days = getDaysBetween(f.start, f.end);
                        let pointsUsed = f.points;

                        if (stratConfig.pointsMode === 'auto') {
                            const today = new Date('2026-07-16');
                            const daysToStart = getDaysBetween(today, f.start);
                            const daysToEnd = getDaysBetween(today, f.end);

                            const tStart = daysToStart / 360;
                            const tEnd = daysToEnd / 360;
                            const rBase = stratConfig.rateBase / 100;
                            const rQuote = stratConfig.rateQuote / 100;
                            
                            const forwardStart = stratConfig.spotRate * (1 + rQuote * tStart) / (1 + rBase * tStart);
                            const forwardEnd = stratConfig.spotRate * (1 + rQuote * tEnd) / (1 + rBase * tEnd);
                            const worstRawRate = Math.min(forwardStart, forwardEnd);

                            pointsUsed = Math.round((worstRawRate - stratConfig.spotRate) * 10000 * 10) / 10;
                        }

                        const rawForwardForRate = stratConfig.spotRate + (pointsUsed / 10000);
                        const calculatedTheoreticalRate = rawForwardForRate * (1 - stratConfig.forwardFee / 100);

                        const hasOverride = f.rateOverride !== undefined && f.rateOverride !== null && f.rateOverride !== '';
                        const parsedOverride = hasOverride ? parseFloat(f.rateOverride) : null;
                        const finalRate = (hasOverride && !isNaN(parsedOverride)) ? parsedOverride : calculatedTheoreticalRate;

                        totalVol += f.volume;
                        weightedSum += (finalRate * f.volume);

                        return {
                            ...f,
                            points: pointsUsed,
                            calculatedRate: finalRate,
                            theoreticalRate: calculatedTheoreticalRate,
                            isOverridden: hasOverride && !isNaN(parsedOverride),
                            days
                        };
                    });

                    const avgRate = totalVol > 0 ? weightedSum / totalVol : 0;
                    const euroNeeded = totalVol > 0 ? totalVol / avgRate : 0;
                    const percNeeds = stratConfig.annualVolume > 0 ? (totalVol / stratConfig.annualVolume) * 100 : 0;
                    const diffVsSpotPerc = stratConfig.spotRate > 0 ? ((avgRate / stratConfig.spotRate) - 1) * 100 : 0;

                    return {
                        id: option.id,
                        name: option.name,
                        detailedForwards,
                        avgRate,
                        totalVol,
                        euroNeeded,
                        percNeeds,
                        diffVsSpotPerc
                    };
                });
            }, [strategyOptions, stratConfig]);

            const marginCalculations = useMemo(() => {
                const contractValueBase = marginVolume; 
                const initialDepositBase = marginVolume * (marginInitialDeposit / 100); 
                const marginCallAmountBase = initialDepositBase; 

                const firstRate = marginForwardRate * (1 + (marginCallTrigger / 100));
                const secondRate = firstRate * (1 + (marginCallTrigger / 100));
                const thirdRate = secondRate * (1 + (marginCallTrigger / 100));

                return {
                    contractValueBase,
                    initialDepositBase,
                    marginCallAmountBase,
                    firstRate,
                    secondRate,
                    thirdRate
                };
            }, [marginVolume, marginForwardRate, marginInitialDeposit, marginCallTrigger]);

            // --- HANDLERS STRIPS ---
            const addStrip = (tab) => {
                const last = strips[tab][strips[tab].length - 1];
                const newId = Math.max(...strips[tab].map(s => s.id), 0) + 1;
                setStrips(prev => ({
                    ...prev,
                    [tab]: [...prev[tab], {
                        id: newId,
                        start: last?.end || '2026-07-17',
                        end: last?.end || '2027-07-16',
                        rate: last?.rate || stripsConfig.spotRate,
                        rateOverride: null
                    }]
                }));
            };

            const removeStrip = (tab, id) => {
                setStrips(prev => ({ ...prev, [tab]: prev[tab].filter(s => s.id !== id) }));
            };

            const handleStripDateChange = (tab, id, field, val) => {
                setStrips(prev => ({
                    ...prev,
                    [tab]: prev[tab].map(s => s.id === id ? { ...s, [field]: val } : s)
                }));
            };

            const handleStripRateChange = (tab, id, val) => {
                setStrips(prev => ({
                    ...prev,
                    [tab]: prev[tab].map(s => s.id === id ? { ...s, rateOverride: val } : s)
                }));
            };

            const handleStripRateStep = (tab, id, currentBaseRate, currentOverride, direction) => {
                const hasOverride = currentOverride !== null && currentOverride !== undefined && currentOverride !== '';
                const baseValue = hasOverride ? parseFloat(currentOverride) : currentBaseRate;
                const step = 0.0001;
                const newValue = direction === 'up' ? baseValue + step : baseValue - step;
                handleStripRateChange(tab, id, newValue.toFixed(4));
            };

            // --- HANDLERS STRATÉGIE ---
            const addOption = () => {
                const newOption = {
                    id: Date.now(),
                    name: `Option ${strategyOptions.length + 1}`,
                    forwards: [
                        { id: 1, start: '2026-07-17', end: '2027-07-16', volume: 1000000, points: 0, rateOverride: null }
                    ]
                };
                setStrategyOptions([...strategyOptions, newOption]);
            };

            const removeOption = (id) => {
                if (strategyOptions.length > 1) {
                    setStrategyOptions(strategyOptions.filter(o => o.id !== id));
                }
            };

            const addStrategyForward = (optionId) => {
                setStrategyOptions(prev => prev.map(opt => {
                    if (opt.id === optionId) {
                        const last = opt.forwards[opt.forwards.length - 1];
                        const newId = Math.max(...opt.forwards.map(f => f.id), 0) + 1;
                        return {
                            ...opt,
                            forwards: [...opt.forwards, {
                                id: newId,
                                start: last?.start || '2026-07-17',
                                end: last?.end || '2027-07-16',
                                volume: 1000000,
                                points: 0,
                                rateOverride: null
                            }]
                        };
                    }
                    return opt;
                }));
            };

            const removeStrategyForward = (optionId, forwardId) => {
                setStrategyOptions(prev => prev.map(opt => {
                    if (opt.id === optionId) {
                        return { ...opt, forwards: opt.forwards.filter(f => f.id !== forwardId) };
                    }
                    return opt;
                }));
            };

            const updateStrategyForward = (optionId, forwardId, field, val) => {
                setStrategyOptions(prev => prev.map(opt => {
                    if (opt.id === optionId) {
                        return {
                            ...opt,
                            forwards: opt.forwards.map(f => f.id === forwardId ? { ...f, [field]: val } : f)
                        };
                    }
                    return opt;
                }));
            };

            const handleRateStep = (optionId, forwardId, currentCalculatedRate, currentOverride, direction) => {
                const hasOverride = currentOverride !== null && currentOverride !== undefined && currentOverride !== '';
                const baseValue = hasOverride ? parseFloat(currentOverride) : currentCalculatedRate;
                const step = 0.0001;
                const newValue = direction === 'up' ? baseValue + step : baseValue - step;
                updateStrategyForward(optionId, forwardId, 'rateOverride', newValue.toFixed(4));
            };

            const handleSyncMarginRates = () => {
                setMarginSpotRate(stratConfig.spotRate);
                if (strategyResults[0] && strategyResults[0].detailedForwards[0]) {
                    setMarginForwardRate(parseFloat(strategyResults[0].detailedForwards[0].calculatedRate.toFixed(4)));
                } else {
                    setMarginForwardRate(stratConfig.spotRate);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 font-sans p-4 md:p-8 relative">
                    
                    {/* Toast Notification */}
                    {toastMessage && (
                        <div className="fixed top-4 right-4 z-50 bg-slate-800 text-white px-5 py-3 rounded-xl shadow-xl border border-slate-700 text-sm font-semibold flex items-center gap-2 animate-bounce">
                            <span className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                            {toastMessage}
                        </div>
                    )}

                    <div className="max-w-6xl mx-auto">
                        
                        {/* Navigation, Langue & Paires */}
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                            <div className="flex p-1 bg-white border border-slate-200 rounded-2xl shadow-sm w-fit flex-wrap">
                                <button
                                    onClick={() => setAppMode('strips')}
                                    className={`flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-semibold transition-all ${appMode === 'strips' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:text-slate-800'}`}
                                >
                                    <LayoutGrid className="w-4 h-4" /> {t.modeStrips}
                                </button>
                                <button
                                    onClick={() => setAppMode('strategy')}
                                    className={`flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-semibold transition-all ${appMode === 'strategy' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:text-slate-800'}`}
                                >
                                    <ShieldCheck className="w-4 h-4" /> {t.modeStrategy}
                                </button>
                                <button
                                    onClick={() => setAppMode('margin')}
                                    className={`flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-semibold transition-all ${appMode === 'margin' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:text-slate-800'}`}
                                >
                                    <Calculator className="w-4 h-4" /> {t.modeMargin}
                                </button>
                            </div>

                            {/* Sélecteur de devises dynamique */}
                            <div className="flex items-center gap-3 bg-white px-4 py-2.5 rounded-2xl shadow-sm border border-slate-200 w-fit">
                                <div className="flex items-center gap-1.5">
                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">From :</label>
                                    <select
                                        value={baseCurr}
                                        onChange={(e) => {
                                            const newBase = e.target.value;
                                            setBaseCurr(newBase);
                                            if (newBase === quoteCurr) setQuoteCurr(baseCurr);
                                        }}
                                        className="bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold text-slate-700 px-2.5 py-1 focus:ring-1 focus:ring-blue-500 outline-none cursor-pointer"
                                    >
                                        {availableCurrencies.map(curr => (
                                            <option key={curr} value={curr}>{curr} ({currencySymbols[curr]})</option>
                                        ))}
                                    </select>
                                </div>
                                <ArrowRight />
                                <div className="flex items-center gap-1.5">
                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">To :</label>
                                    <select
                                        value={quoteCurr}
                                        onChange={(e) => {
                                            const newQuote = e.target.value;
                                            setQuoteCurr(newQuote);
                                            if (newQuote === baseCurr) setBaseCurr(quoteCurr);
                                        }}
                                        className="bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold text-slate-700 px-2.5 py-1 focus:ring-1 focus:ring-blue-500 outline-none cursor-pointer"
                                    >
                                        {availableCurrencies.map(curr => (
                                            <option key={curr} value={curr}>{curr} ({currencySymbols[curr]})</option>
                                        ))}
                                    </select>
                                </div>
                            </div>

                            <button
                                onClick={() => setLang(lang === 'fr' ? 'en' : 'fr')}
                                className="flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-sm border border-slate-200 hover:bg-slate-50 transition-colors font-medium text-slate-700 w-fit"
                            >
                                <Languages />
                                {lang.toUpperCase()}
                            </button>
                        </div>

                        {appMode === 'strips' ? (
                            /* --- CONTENU MODE STRIPS --- */
                            <>
                                <header className="mb-8">
                                    <h1 className="text-3xl font-bold tracking-tight text-slate-800">
                                        {t.title} <span className="text-blue-600">Strip Forwards ({baseCurr}/{quoteCurr})</span>
                                    </h1>
                                    <p className="text-slate-500 mt-1">{t.subtitle}</p>
                                </header>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="lg:col-span-2 space-y-6">
                                        
                                        {/* Configuration Strips */}
                                        <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm space-y-6">
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                <div className="space-y-2">
                                                    <div className="flex items-center justify-between">
                                                        <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">{t.spotToday}</label>
                                                        <div className="flex items-center gap-1.5">
                                                            <button
                                                                type="button"
                                                                onClick={() => setIsLive(!isLive)}
                                                                className={`flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full border transition-all select-none ${
                                                                    isLive ? 'bg-emerald-50 border-emerald-200 text-emerald-600' : 'bg-slate-100 border-slate-200 text-slate-500 hover:bg-slate-200'
                                                                }`}
                                                            >
                                                                <span className={`w-1.5 h-1.5 rounded-full ${isLive ? 'bg-emerald-500 animate-pulse' : 'bg-slate-400'}`} />
                                                                {isLive ? 'LIVE' : 'MANUEL'}
                                                            </button>
                                                            {isLive && (
                                                                <button type="button" onClick={fetchSpotPrice} className="p-1 hover:bg-slate-100 rounded-lg text-slate-500 hover:text-blue-600 transition-colors" title={t.refreshRate}>
                                                                    <RefreshCw />
                                                                </button>
                                                            )}
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                        <TrendingUp />
                                                        <input
                                                            type="number" step="0.0001"
                                                            value={isLive ? stripsConfig.spotRate.toFixed(4) : stripsConfig.spotRate}
                                                            onChange={e => {
                                                                const roundedVal = Math.round((parseFloat(e.target.value) || 0) * 10000) / 10000;
                                                                setStripsConfig({...stripsConfig, spotRate: roundedVal});
                                                                setIsLive(false);
                                                            }}
                                                            className="bg-transparent font-bold text-xl outline-none w-full"
                                                        />
                                                    </div>
                                                </div>
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">{t.forwardFee}</label>
                                                    <div className="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                        <RefreshCw className="w-5 h-5 text-blue-500" />
                                                        <input
                                                            type="number" step="0.01"
                                                            value={stripsConfig.forwardFee}
                                                            onChange={e => setStripsConfig({...stripsConfig, forwardFee: parseFloat(e.target.value) || 0})}
                                                            className="bg-transparent font-bold text-xl outline-none w-full"
                                                        />
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Sélecteur de méthode de calcul des points forward */}
                                            <div className="pt-4 border-t border-slate-100 grid grid-cols-1 md:grid-cols-3 gap-6">
                                                <div className="space-y-2">
                                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">{t.pointsMode}</label>
                                                    <div className="flex p-1 bg-slate-100 rounded-xl w-full">
                                                        <button
                                                            type="button"
                                                            onClick={() => setStripsConfig({...stripsConfig, pointsMode: 'manual'})}
                                                            className={`flex-1 text-center py-2 text-xs font-semibold rounded-lg transition-all ${stripsConfig.pointsMode === 'manual' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                                                        >
                                                            {t.manual}
                                                        </button>
                                                        <button
                                                            type="button"
                                                            onClick={() => setStripsConfig({...stripsConfig, pointsMode: 'auto'})}
                                                            className={`flex-1 text-center py-2 text-xs font-semibold rounded-lg transition-all ${stripsConfig.pointsMode === 'auto' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                                                        >
                                                            {t.autoIRP}
                                                        </button>
                                                    </div>
                                                </div>

                                                {stripsConfig.pointsMode === 'auto' && (
                                                    <>
                                                        <div className="space-y-2 animate-in fade-in slide-in-from-left-4 duration-300">
                                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">{t.rateBase.replace('EUR %', `${baseCurr} %`)}</label>
                                                            <div className="bg-slate-50 p-2.5 rounded-2xl border border-slate-100">
                                                                <input
                                                                    type="number" step="0.01"
                                                                    value={stripsConfig.rateBase}
                                                                    onChange={e => setStripsConfig({...stripsConfig, rateBase: parseFloat(e.target.value) || 0})}
                                                                    className="bg-transparent font-bold text-base outline-none w-full"
                                                                />
                                                            </div>
                                                        </div>
                                                        <div className="space-y-2 animate-in fade-in slide-in-from-left-4 duration-300">
                                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">{t.rateQuote.replace('USD %', `${quoteCurr} %`)}</label>
                                                            <div className="bg-slate-50 p-2.5 rounded-2xl border border-slate-100">
                                                                <input
                                                                    type="number" step="0.01"
                                                                    value={stripsConfig.rateQuote}
                                                                    onChange={e => setStripsConfig({...stripsConfig, rateQuote: parseFloat(e.target.value) || 0})}
                                                                    className="bg-transparent font-bold text-base outline-none w-full"
                                                                />
                                                            </div>
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        </div>

                                        {/* Onglets périodicités */}
                                        <div className="flex p-1 bg-slate-200 rounded-xl w-fit">
                                            {['monthly', 'quarterly', 'semiAnnual'].map(key => (
                                                <button
                                                    key={key}
                                                    onClick={() => setActiveTab(key)}
                                                    className={`px-6 py-2 rounded-lg text-sm font-medium transition-all ${activeTab === key ? 'bg-white shadow-sm text-blue-600' : 'text-slate-600 hover:text-slate-800'}`}
                                                >
                                                    {t[key]}
                                                </button>
                                            ))}
                                        </div>

                                        {/* Liste détail de l'onglet Strips */}
                                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                            <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                                <div className="flex items-center gap-2">
                                                    <Calendar />
                                                    <h2 className="font-semibold text-slate-700">{t.periodDetails} ({t[activeTab]})</h2>
                                                </div>
                                                <button onClick={() => addStrip(activeTab)} className="flex items-center gap-1 text-sm font-medium text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg transition-colors">
                                                    <Plus /> {t.add}
                                                </button>
                                            </div>
                                            <div className="divide-y divide-slate-100 max-h-[500px] overflow-y-auto">
                                                {calculatedStrips[activeTab].map((strip) => (
                                                    <div key={strip.id} className="p-4 hover:bg-slate-50 transition-colors group flex items-center justify-between flex-wrap md:flex-nowrap gap-4">
                                                        <div className="flex items-center gap-4 shrink-0">
                                                            <div className="w-8 h-8 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center text-xs font-bold shrink-0">{strip.id}</div>
                                                            <div className="flex flex-col">
                                                                <div className="flex items-center gap-3">
                                                                    <input
                                                                        type="date"
                                                                        value={strip.start}
                                                                        onChange={(e) => handleStripDateChange(activeTab, strip.id, 'start', e.target.value)}
                                                                        className="text-sm font-medium text-slate-600 bg-slate-50 border border-slate-200 rounded-lg px-2 py-1"
                                                                    />
                                                                    <ArrowRight />
                                                                    <input
                                                                        type="date"
                                                                        value={strip.end}
                                                                        onChange={(e) => handleStripDateChange(activeTab, strip.id, 'end', e.target.value)}
                                                                        className="text-sm font-medium text-slate-600 bg-slate-50 border border-slate-200 rounded-lg px-2 py-1"
                                                                    />
                                                                </div>
                                                                <div className="text-[10px] text-slate-400 mt-1 font-medium">{strip.days} {t.days} (Act/360)</div>
                                                            </div>
                                                        </div>

                                                        <div className="flex items-center gap-4 ml-auto">
                                                            {stripsConfig.pointsMode === 'auto' && (
                                                                <div className="text-center shrink-0">
                                                                    <div className="text-xs font-bold text-slate-500">{strip.points > 0 ? '+' : ''}{strip.points}</div>
                                                                    <div className="text-[9px] text-slate-400">Pts</div>
                                                                </div>
                                                            )}

                                                            <div className="flex items-center gap-1">
                                                                <div className="flex flex-col items-center select-none shrink-0">
                                                                    <button type="button" onClick={() => handleStripRateStep(activeTab, strip.id, strip.theoreticalRate, strip.rateOverride, 'up')} className="p-0.5 text-slate-400 hover:text-blue-600 hover:bg-slate-100 rounded transition-colors" title="Incrémenter (+0.0001)">
                                                                        <ChevronUpIcon />
                                                                    </button>
                                                                    <button type="button" onClick={() => handleStripRateStep(activeTab, strip.id, strip.theoreticalRate, strip.rateOverride, 'down')} className="p-0.5 text-slate-400 hover:text-blue-600 hover:bg-slate-100 rounded transition-colors" title="Décrémenter (-0.0001)">
                                                                        <ChevronDownIcon />
                                                                    </button>
                                                                </div>

                                                                <input
                                                                    type="text"
                                                                    value={strip.rateOverride !== undefined && strip.rateOverride !== null ? strip.rateOverride : strip.calculatedRate.toFixed(4)}
                                                                    onChange={(e) => handleStripRateChange(activeTab, strip.id, e.target.value)}
                                                                    className={`text-right font-mono font-bold bg-transparent border-b border-dashed outline-none w-20 focus:border-blue-500 p-0.5 transition-colors ${strip.isOverridden ? 'text-amber-500 border-amber-400' : 'text-slate-700 border-slate-200 hover:border-slate-400'}`}
                                                                />
                                                                {strip.isOverridden && (
                                                                    <button onClick={() => handleStripRateChange(activeTab, strip.id, null)} className="p-1 text-[9px] font-bold text-amber-500 hover:text-amber-700 hover:bg-amber-50 rounded transition-colors shrink-0" title="Réinitialiser">
                                                                        Reset
                                                                    </button>
                                                                )}
                                                            </div>

                                                            <button onClick={() => removeStrip(activeTab, strip.id)} className="p-2 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all shrink-0">
                                                                <Trash2 className="w-4 h-4" />
                                                            </button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    {/* Sidebar Strip calculations */}
                                    <div className="space-y-6">
                                        <div className="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-3xl p-8 text-white shadow-xl shadow-blue-200 relative overflow-hidden">
                                            <div className="relative z-10">
                                                <span className="text-sm font-medium uppercase tracking-wider opacity-80">{t.blendedRate}</span>
                                                <div className="flex items-baseline gap-3 mb-4">
                                                    <div className="text-5xl font-bold tabular-nums">{blendedRates[activeTab].toFixed(4)}</div>
                                                    <div className={`text-sm font-bold px-2 py-0.5 rounded-lg ${stripDiffVsSpotPerc > 0 ? 'bg-white/20 text-emerald-300' : 'bg-white/20 text-amber-300'}`}>
                                                        {stripDiffVsSpotPerc > 0 ? '+' : ''}{stripDiffVsSpotPerc.toFixed(2)}%
                                                    </div>
                                                </div>
                                                <div className="text-xs text-blue-100/60 uppercase font-bold tracking-widest">{t.vsSpot} {stripsConfig.spotRate.toFixed(4)}</div>
                                            </div>
                                        </div>
                                        <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm">
                                            <h3 className="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2"><BarChart3 className="w-4 h-4 text-blue-500" /> {t.comparison}</h3>
                                            <div className="space-y-4">
                                                {['monthly', 'quarterly', 'semiAnnual'].map(key => (
                                                    <div key={key} className={`flex items-center justify-between p-3 rounded-xl ${activeTab === key ? 'bg-blue-50 border-blue-100 border' : 'bg-slate-50'}`}>
                                                        <span className="text-sm font-medium text-slate-600">{t[key]}</span>
                                                        <span className="font-mono font-bold">{blendedRates[key].toFixed(4)}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </>
                        ) : appMode === 'strategy' ? (
                            /* --- CONTENU MODE STRATÉGIE --- */
                            <div className="space-y-8 animate-in fade-in duration-500 pb-20">
                                <header className="flex flex-col md:flex-row md:items-end justify-between gap-4">
                                    <div>
                                        <h1 className="text-3xl font-bold tracking-tight text-slate-800">
                                            {t.modeStrategy} <span className="text-emerald-600">{t.strategyTitle} ({baseCurr}/{quoteCurr})</span>
                                        </h1>
                                        <p className="text-slate-500 mt-1">{t.strategyDesc}</p>
                                    </div>
                                    <button onClick={addOption} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl shadow-md transition-all font-semibold text-sm">
                                        <Plus /> {t.addOption}
                                    </button>
                                </header>

                                {/* Config globale Strategy */}
                                <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="space-y-2">
                                            <div className="flex items-center justify-between">
                                                <label className="text-xs font-bold text-slate-400 uppercase tracking-wider">{t.spotToday}</label>
                                                <div className="flex items-center gap-1.5">
                                                    <button
                                                        type="button"
                                                        onClick={() => {
                                                            if (isLive) {
                                                                setStripsConfig(prev => ({ ...prev, spotRate: Math.round(prev.spotRate * 10000) / 10000 }));
                                                                setStratConfig(prev => ({ ...prev, spotRate: Math.round(prev.spotRate * 10000) / 10000 }));
                                                            }
                                                            setIsLive(!isLive);
                                                        }}
                                                        className={`flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded-full border transition-all select-none ${isLive ? 'bg-emerald-50 border-emerald-200 text-emerald-600' : 'bg-slate-100 border-slate-200 text-slate-500 hover:bg-slate-200'}`}
                                                    >
                                                        <span className={`w-1.5 h-1.5 rounded-full ${isLive ? 'bg-emerald-500 animate-pulse' : 'bg-slate-400'}`} />
                                                        {isLive ? 'LIVE' : 'MANUEL'}
                                                    </button>
                                                    {isLive && (
                                                        <button type="button" onClick={fetchSpotPrice} className="p-1 hover:bg-slate-100 rounded-lg text-slate-500 hover:text-blue-600 transition-colors" title={t.refreshRate}>
                                                            <RefreshCw />
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                <TrendingUp />
                                                <input
                                                    type="number" step="0.0001"
                                                    value={isLive ? stratConfig.spotRate.toFixed(4) : stratConfig.spotRate}
                                                    onChange={e => {
                                                        const roundedVal = Math.round((parseFloat(e.target.value) || 0) * 10000) / 10000;
                                                        setStratConfig({...stratConfig, spotRate: roundedVal});
                                                        setIsLive(false);
                                                    }}
                                                    className="bg-transparent font-bold text-xl outline-none w-full"
                                                />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">{t.forwardFee}</label>
                                            <div className="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                <RefreshCw className="w-5 h-5 text-blue-500" />
                                                <input
                                                    type="number" step="0.01"
                                                    value={stratConfig.forwardFee}
                                                    onChange={e => setStratConfig({...stratConfig, forwardFee: parseFloat(e.target.value) || 0})}
                                                    className="bg-transparent font-bold text-xl outline-none w-full"
                                                />
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">{t.totalVolume}</label>
                                            <div className="flex items-center gap-2 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                                                <span className="font-bold text-slate-400">{currencySymbols[quoteCurr]}</span>
                                                <input
                                                    type="text"
                                                    value={formatInputNumber(stratConfig.annualVolume)}
                                                    onChange={e => setStratConfig({...stratConfig, annualVolume: parseInputNumber(e.target.value)})}
                                                    className="bg-transparent font-bold text-xl outline-none w-full"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Points calculation Method */}
                                    <div className="pt-4 border-t border-slate-100 grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">{t.pointsMode}</label>
                                            <div className="flex p-1 bg-slate-100 rounded-xl w-full">
                                                <button type="button" onClick={() => setStratConfig({...stratConfig, pointsMode: 'manual'})} className={`flex-1 text-center py-2 text-xs font-semibold rounded-lg transition-all ${stratConfig.pointsMode === 'manual' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>
                                                    {t.manual}
                                                </button>
                                                <button type="button" onClick={() => setStratConfig({...stratConfig, pointsMode: 'auto'})} className={`flex-1 text-center py-2 text-xs font-semibold rounded-lg transition-all ${stratConfig.pointsMode === 'auto' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>
                                                    {t.autoIRP}
                                                </button>
                                            </div>
                                        </div>

                                        {stratConfig.pointsMode === 'auto' && (
                                            <>
                                                <div className="space-y-2 animate-in fade-in slide-in-from-left-4 duration-300">
                                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">{t.rateBase.replace('EUR %', `${baseCurr} %`)}</label>
                                                    <div className="bg-slate-50 p-2.5 rounded-2xl border border-slate-100">
                                                        <input
                                                            type="number" step="0.01"
                                                            value={stratConfig.rateBase}
                                                            onChange={e => setStratConfig({...stratConfig, rateBase: parseFloat(e.target.value) || 0})}
                                                            className="bg-transparent font-bold text-base outline-none w-full"
                                                        />
                                                    </div>
                                                </div>
                                                <div className="space-y-2 animate-in fade-in slide-in-from-left-4 duration-300">
                                                    <label className="text-xs font-bold text-slate-400 uppercase tracking-widest">{t.rateQuote.replace('USD %', `${quoteCurr} %`)}</label>
                                                    <div className="bg-slate-50 p-2.5 rounded-2xl border border-slate-100">
                                                        <input
                                                            type="number" step="0.01"
                                                            value={stratConfig.rateQuote}
                                                            onChange={e => setStratConfig({...stratConfig, rateQuote: parseFloat(e.target.value) || 0})}
                                                            className="bg-transparent font-bold text-base outline-none w-full"
                                                        />
                                                    </div>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                </div>

                                {/* Options and Strategy grids */}
                                <div className="space-y-12">
                                    {strategyResults.map((res, idx) => (
                                        <div key={res.id} className="space-y-4 animate-in slide-in-from-bottom-4 duration-300">
                                            <div className="flex items-center justify-between px-2">
                                                <div className="flex items-center gap-4">
                                                    <h2 className="text-xl font-bold text-slate-700 flex items-center gap-2">
                                                        <div className={`w-3 h-3 rounded-full ${idx % 2 === 0 ? 'bg-blue-500' : 'bg-emerald-500'}`} />
                                                        {res.name}
                                                    </h2>
                                                    {strategyOptions.length > 1 && (
                                                        <button onClick={() => removeOption(res.id)} className="p-1.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-all">
                                                            <Trash2 />
                                                        </button>
                                                    )}
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => copyToClipboard(res)} className="flex items-center gap-1.5 text-xs font-bold text-white bg-slate-700 px-4 py-2 rounded-xl hover:bg-slate-800 transition-colors shadow-sm" title={t.copyBtn}>
                                                        <Copy className="w-3.5 h-3.5" /> {t.copyBtn}
                                                    </button>
                                                    <button onClick={() => addStrategyForward(res.id)} className="text-xs font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-xl hover:bg-blue-100 transition-colors flex items-center gap-1 shadow-sm">
                                                        <Plus className="w-3.5 h-3.5" /> {t.add}
                                                    </button>
                                                </div>
                                            </div>

                                            <div className="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-left border-collapse min-w-[600px]">
                                                        <thead className="bg-slate-50/50 border-b border-slate-100 text-[10px] uppercase font-bold text-slate-400">
                                                            <tr>
                                                                <th className="px-6 py-4">Dates</th>
                                                                <th className="px-6 py-4">{t.volume} ({currencySymbols[quoteCurr]})</th>
                                                                <th className="px-6 py-4 text-center">Pts</th>
                                                                <th className="px-6 py-4 text-right">Rate</th>
                                                                <th className="px-6 py-4 w-10"></th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-50">
                                                            {res.detailedForwards.map(f => (
                                                                <tr key={f.id} className="group hover:bg-slate-50/50 transition-colors">
                                                                    <td className="px-6 py-4">
                                                                        <div className="flex items-center gap-2">
                                                                            <input
                                                                                type="date"
                                                                                value={f.start}
                                                                                onChange={(e) => updateStrategyForward(res.id, f.id, 'start', e.target.value)}
                                                                                className="text-sm font-medium border-none p-0 bg-transparent text-slate-600 focus:ring-0 cursor-pointer"
                                                                            />
                                                                            <span className="text-slate-300">-</span>
                                                                            <input
                                                                                type="date"
                                                                                value={f.end}
                                                                                onChange={(e) => updateStrategyForward(res.id, f.id, 'end', e.target.value)}
                                                                                className="text-sm font-medium border-none p-0 bg-transparent text-slate-600 focus:ring-0 cursor-pointer"
                                                                            />
                                                                        </div>
                                                                        <div className="text-[10px] text-slate-400 mt-1 font-medium">{f.days} {t.days} (Act/360)</div>
                                                                    </td>
                                                                    <td className="px-6 py-4">
                                                                        <input
                                                                            type="text"
                                                                            value={formatInputNumber(f.volume)}
                                                                            onChange={(e) => updateStrategyForward(res.id, f.id, 'volume', parseInputNumber(e.target.value))}
                                                                            className="w-full font-bold text-slate-700 bg-transparent outline-none border-b border-transparent focus:border-blue-200"
                                                                        />
                                                                        <div className="flex gap-1.5 mt-1 flex-wrap">
                                                                            {[100000, 500000, 1000000].map((amount) => (
                                                                                <button
                                                                                    key={amount}
                                                                                    type="button"
                                                                                    onClick={() => updateStrategyForward(res.id, f.id, 'volume', f.volume + amount)}
                                                                                    className="text-[10px] font-semibold text-slate-500 bg-slate-100 hover:bg-slate-200 px-1.5 py-0.5 rounded transition-colors"
                                                                                >
                                                                                    +{amount.toLocaleString(lang === 'fr' ? 'fr-FR' : 'en-US')}
                                                                                </button>
                                                                            ))}
                                                                        </div>
                                                                    </td>
                                                                    <td className="px-6 py-4 text-center">
                                                                        <input
                                                                            type="number"
                                                                            value={f.points}
                                                                            onChange={(e) => updateStrategyForward(res.id, f.id, 'points', parseFloat(e.target.value) || 0)}
                                                                            disabled={stratConfig.pointsMode === 'auto'}
                                                                            className={`w-16 mx-auto text-center text-blue-600 font-bold bg-transparent outline-none border-b border-transparent ${stratConfig.pointsMode === 'auto' ? 'opacity-70 cursor-not-allowed bg-slate-50 rounded px-1' : 'focus:border-blue-200'}`}
                                                                        />
                                                                        {stratConfig.pointsMode === 'auto' && (
                                                                            <div className="text-[9px] text-emerald-600 font-semibold mt-1">Calculé</div>
                                                                        )}
                                                                    </td>
                                                                    <td className="px-6 py-4 text-right">
                                                                        <div className="flex items-center justify-end gap-1.5">
                                                                            <div className="flex flex-col items-center select-none shrink-0">
                                                                                <button type="button" onClick={() => handleRateStep(res.id, f.id, f.theoreticalRate, f.rateOverride, 'up')} className="p-0.5 text-slate-400 hover:text-blue-600 hover:bg-slate-100 rounded transition-colors" title="Incrémenter (+0.0001)">
                                                                                    <ChevronUpIcon />
                                                                                </button>
                                                                                <button type="button" onClick={() => handleRateStep(res.id, f.id, f.theoreticalRate, f.rateOverride, 'down')} className="p-0.5 text-slate-400 hover:text-blue-600 hover:bg-slate-100 rounded transition-colors" title="Décrémenter (-0.0001)">
                                                                                    <ChevronDownIcon />
                                                                                </button>
                                                                            </div>

                                                                            <input
                                                                                type="text"
                                                                                value={f.rateOverride !== undefined && f.rateOverride !== null ? f.rateOverride : f.calculatedRate.toFixed(4)}
                                                                                onChange={(e) => updateStrategyForward(res.id, f.id, 'rateOverride', e.target.value)}
                                                                                className={`text-right font-mono font-bold bg-transparent border-b border-dashed outline-none w-20 focus:border-blue-500 p-0.5 transition-colors ${f.isOverridden ? 'text-amber-500 border-amber-400' : 'text-slate-700 border-slate-200 hover:border-slate-400'}`}
                                                                            />
                                                                            {f.isOverridden && (
                                                                                <button onClick={() => updateStrategyForward(res.id, f.id, 'rateOverride', null)} className="p-1 text-[9px] font-bold text-amber-500 hover:text-amber-700 hover:bg-amber-50 rounded transition-colors" title="Réinitialiser">
                                                                                    Reset
                                                                                </button>
                                                                            )}
                                                                        </div>
                                                                    </td>
                                                                    <td className="px-6 py-4">
                                                                        <button onClick={() => removeStrategyForward(res.id, f.id)} className="p-1.5 text-slate-200 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                                                                            <Trash2 />
                                                                        </button>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>

                                                {/* Summary card logic */}
